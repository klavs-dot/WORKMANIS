name: CI

# Runs typecheck + lint on every push and PR. Build is skipped here
# because Vercel already builds + deploys on push to main; failing
# the GitHub Actions build a second time on the same commit adds
# noise without catching anything new.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref
# (e.g. amend + force-push during a PR review).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
